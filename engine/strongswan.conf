charon {
    load_modular = yes
    plugins {
        include strongswan.d/charon/*.conf
    }
    # Log to a file the entrypoint can parse for the discovered P-CSCF address.
    filelog {
        vowifi {
            path = /run/vowifi/charon.log
            default = 1
            ike = 2
            cfg = 2
            append = no
            flush_line = yes
        }
    }
}
